      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.1" cy="0.95" r="0.55">
      <stop offset="0" stop-color="#2DD4BF" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="300" rx="16" fill="#0A0E14"/>
  <rect width="1280" height="300" rx="16" fill="url(#glowA)"/>
  <rect width="1280" height="300" rx="16" fill="url(#glowB)"/>

  <g fill="#1E293B">
