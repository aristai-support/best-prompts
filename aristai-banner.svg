    <rect x="208" y="226" width="176" height="34" rx="17" fill="#111827" stroke="#312E81"/>
    <text x="296" y="248" text-anchor="middle" fill="#A5B4FC">Grad Students</text>
    <rect x="396" y="226" width="230" height="34" rx="17" fill="#111827" stroke="#134E4A"/>
    <text x="511" y="248" text-anchor="middle" fill="#5EEAD4">Instructional Designers</text>
    <rect x="638" y="226" width="150" height="34" rx="17" fill="#111827" stroke="#134E4A"/>
