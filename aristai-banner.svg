    <circle cx="1060" cy="110" r="3"/><circle cx="1100" cy="110" r="3"/><circle cx="1140" cy="110" r="3"/><circle cx="1180" cy="110" r="3"/>
    <circle cx="1060" cy="150" r="3"/><circle cx="1100" cy="150" r="3"/><circle cx="1140" cy="150" r="3"/><circle cx="1180" cy="150" r="3"/>
  </g>

  <text x="64" y="76" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="700" fill="url(#accent)">AristAI</text>
  <text x="162" y="76" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="400" fill="#64748B">· Education Suite</text>

  <text x="62" y="152" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="58" font-weight="800" fill="#F8FAFC">Prompt Library</text>
  <text x="64" y="196" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" fill="#94A3B8">Curated, classroom-ready AI prompts for teaching, research, and campus operations</text>

